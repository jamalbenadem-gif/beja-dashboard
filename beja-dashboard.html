}

    try {

    setErledigt(prev => {
      const next = { ...prev };
      if (next[id]) { delete next[id]; }
      else {
        const n = new Date();
        next[id] = `${n.toLocaleDateString("de-DE")} ${n.toLocaleTimeString("de-DE",{hour:"2-digit",minute:"2-digit"})}`;
      }
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(next)); } catch {}
      return next;
    });
  }, []);
  const reset = useCallback(() => {
    setErledigt({});
    try { localStorage.setItem(STORAGE_KEY, "{}"); } catch {}
  }, []);
  return { erledigt, toggle, reset, loaded };
}

// ── Patient Card ──────────────────────────────────────────────────────────────
function PatientCard({ p, idx, erledigt, onToggle }) {
  const [open, setOpen] = useState(false);
  const done = !!erledigt[p.id];
  const col = PLZ_COL[p.plz] || "#6b7280";

  return (
    <div style={{
      borderRadius: 10,
      border: `1px solid ${done ? "#bbf7d0" : "#e5e7eb"}`,
      background: done ? "#f0fdf4" : "#fff",
      marginBottom: 6,
      overflow: "hidden",
      transition: "all 0.15s",
    }}>
      {/* Main row */}
      <div style={{ display:"flex", alignItems:"center", gap:10, padding:"10px 12px" }}>

        {/* Checkbox */}
        <button onClick={() => onToggle(p.id)} style={{
          width: 22, height: 22, borderRadius: 6, flexShrink: 0,
          border: `2px solid ${done ? G : "#d1d5db"}`,
          background: done ? G : "#fff",
          display:"flex", alignItems:"center", justifyContent:"center",
          cursor:"pointer", padding:0, transition:"all 0.15s",
        }}>
          {done && <span style={{color:"#fff",fontSize:12,lineHeight:1}}>✓</span>}
        </button>

        {/* Nr bubble */}
        <div style={{
          width:24, height:24, borderRadius:"50%", flexShrink:0,
          background: done ? "#d1d5db" : col,
          color:"#fff", fontSize:10, fontWeight:800,
          display:"flex", alignItems:"center", justifyContent:"center",
        }}>{idx}</div>

        {/* Name + Address */}
        <div style={{ flex:1, minWidth:0 }}>
          <div style={{
            fontSize: 13, fontWeight: 700,
            color: done ? "#6b7280" : "#111",
            textDecoration: done ? "line-through" : "none",
          }}>{p.name}</div>
          <div style={{ fontSize:11, color:"#6b7280", marginTop:1 }}>
            {p.addr} · {p.plz} {p.ort}
          </div>
        </div>

        {/* PLZ badge + expand */}
        <div style={{ display:"flex", flexDirection:"column", alignItems:"flex-end", gap:3, flexShrink:0 }}>
          <span style={{
            background: col+"18", color: col,
            border:`1px solid ${col}30`,
            borderRadius:999, padding:"1px 7px", fontSize:10, fontWeight:700,
          }}>{p.plz}</span>
          <button onClick={() => setOpen(v => !v)} style={{
            background:"none", border:"none", cursor:"pointer",
            color:"#9ca3af", fontSize:10, padding:0,
          }}>{open ? "▲ weniger" : "▼ mehr"}</button>
        </div>
      </div>

      {/* Expanded detail */}
      {open && (
        <div style={{
          borderTop: "1px solid #f3f4f6",
          background: "#f9fafb",
          padding: "10px 12px",
          display:"flex", gap:12, flexWrap:"wrap", alignItems:"center",
        }}>
          <div style={{ flex:1, minWidth:160 }}>
            <div style={{ fontSize:11, color:"#6b7280" }}>
              📞 <strong>{p.tel}</strong>
            </div>
            <div style={{ fontSize:11, color:"#6b7280", marginTop:3 }}>
              📅 Letzter Einsatz: <strong>{p.dat}</strong>
            </div>
            <div style={{ fontSize:11, color:"#6b7280", marginTop:3 }}>
              🔢 Klienten-Nr.: <strong>{p.id}</strong>
            </div>
            {done && (
              <div style={{ fontSize:11, color:G, marginTop:3, fontWeight:700 }}>
                ✓ Erledigt: {erledigt[p.id]}
              </div>
            )}
          </div>
          <div style={{ display:"flex", gap:8 }}>
            <a href={`https://www.google.com/maps/search/${encodeURIComponent(p.addr+", "+p.plz+" "+p.ort)}`}
              target="_blank" rel="noopener noreferrer"
              style={{ background:G, color:"#fff", borderRadius:7, padding:"6px 12px", fontSize:11, fontWeight:700, textDecoration:"none" }}>
              🗺️ Maps
            </a>
            {p.tel !== "–" && (
              <a href={`tel:${p.tel.replace(/[-\s/]/g,"")}`}
                style={{ background:"#eff6ff", color:"#2563eb", border:"1px solid #bfdbfe", borderRadius:7, padding:"6px 12px", fontSize:11, fontWeight:700, textDecoration:"none" }}>
                📞 Anrufen
              </a>
            )}
          </div>
        </div>
      )}
    </div>
  );
}

// ── Board Panel ───────────────────────────────────────────────────────────────
function BoardPanel({ board, erledigt, onToggle, onReset }) {
  const [search, setSearch] = useState("");
  const [filterPlz, setFilterPlz] = useState("alle");
  const [sort, setSort] = useState("route");
  const [showDone, setShowDone] = useState(true);

  const isArchiv = board.key === "ma4";
  const rawGroup = isArchiv
    ? PATIENTS.filter(p => erledigt[p.id]).sort((a,b) => (erledigt[b.id]||"").localeCompare(erledigt[a.id]||""))
    : board.group;

  const plzList = useMemo(() => ["alle",...new Set(rawGroup.map(p=>p.plz))], [rawGroup]);

  const list = useMemo(() => {
    let l = [...rawGroup];
    if (!isArchiv && !showDone) l = l.filter(p => !erledigt[p.id]);
    if (search) l = l.filter(p =>
      p.name.toLowerCase().includes(search.toLowerCase()) ||
      p.addr.toLowerCase().includes(search.toLowerCase()) ||
      p.plz.includes(search)
    );
    if (filterPlz !== "alle") l = l.filter(p => p.plz === filterPlz);
    if (!isArchiv) {
      if (sort === "name") l.sort((a,b) => a.name.localeCompare(b.name,"de"));
      if (sort === "datum") l.sort((a,b) => b.dat.split(".").reverse().join("").localeCompare(a.dat.split(".").reverse().join("")));
      l.sort((a,b) => (!!erledigt[a.id]?1:0)-(!!erledigt[b.id]?1:0));
    }
    return l;
  }, [rawGroup, search, filterPlz, sort, erledigt, showDone, isArchiv]);

  const doneCount = isArchiv ? rawGroup.length : board.group.filter(p=>erledigt[p.id]).length;
  const total = isArchiv ? PATIENTS.length : board.group.length;
  const pct = total > 0 ? Math.round(doneCount/total*100) : 0;

  const plzCount = useMemo(() => {
    const c={}; rawGroup.forEach(p=>c[p.plz]=(c[p.plz]||0)+1); return c;
  }, [rawGroup]);

  const openList = list.filter(p => !erledigt[p.id]);

  return (
    <div style={{ display:"flex", flexDirection:"column", height:"100%" }}>

      {/* Stats bar */}
      <div style={{
        padding:"12px 16px", borderBottom:"1px solid #f3f4f6",
        display:"flex", alignItems:"center", gap:12, flexWrap:"wrap",
      }}>
        {/* Progress */}
        <div style={{ flex:1, minWidth:200 }}>
          <div style={{ display:"flex", justifyContent:"space-between", marginBottom:4 }}>
            <span style={{ fontSize:12, color:"#374151", fontWeight:600 }}>
              {isArchiv ? `${doneCount} von ${total} abgehakt` : `Fortschritt: ${doneCount}/${total} erledigt`}
            </span>
            <span style={{ fontSize:12, fontWeight:800, color:board.color }}>{pct}%</span>
          </div>
          <div style={{ height:6, background:"#f3f4f6", borderRadius:9, overflow:"hidden" }}>
            <div style={{ height:"100%", width:`${pct}%`, background:board.color, borderRadius:9, transition:"width 0.4s" }} />
          </div>
        </div>

        {/* PLZ filter bubbles */}
        <div style={{ display:"flex", gap:4, flexWrap:"wrap" }}>
          <span onClick={()=>setFilterPlz("alle")} style={{
            background: filterPlz==="alle" ? board.color : "#f3f4f6",
            color: filterPlz==="alle" ? "#fff" : "#6b7280",
            borderRadius:999, padding:"3px 10px", fontSize:11, fontWeight:700,
            cursor:"pointer", border:`1px solid ${filterPlz==="alle"?board.color:"#e5e7eb"}`,
          }}>Alle</span>
          {Object.entries(plzCount).map(([plz,n]) => (
            <span key={plz} onClick={()=>setFilterPlz(plz===filterPlz?"alle":plz)} style={{
              background: filterPlz===plz ? (PLZ_COL[plz]||"#6b7280") : (PLZ_COL[plz]||"#6b7280")+"15",
              color: filterPlz===plz ? "#fff" : (PLZ_COL[plz]||"#6b7280"),
              border:`1px solid ${(PLZ_COL[plz]||"#6b7280")}40`,
              borderRadius:999, padding:"3px 10px", fontSize:11, fontWeight:700, cursor:"pointer",
            }}>{plz} <span style={{opacity:0.7}}>({n})</span></span>
          ))}
        </div>
      </div>

      {/* Search + controls */}
      <div style={{
        padding:"8px 16px", borderBottom:"1px solid #f3f4f6",
        display:"flex", gap:8, alignItems:"center", flexWrap:"wrap",
      }}>
        <input value={search} onChange={e=>setSearch(e.target.value)}
          placeholder="🔍 Name, Adresse oder PLZ suchen…"
          style={{
            flex:1, minWidth:200,
            border:"1px solid #e5e7eb", borderRadius:8,
            padding:"7px 12px", fontSize:12,
          }}
        />
        {!isArchiv && (
          <>
            <select value={sort} onChange={e=>setSort(e.target.value)} style={{
              border:"1px solid #e5e7eb", borderRadius:8, padding:"7px 10px", fontSize:12,
            }}>
              <option value="route">Reihenfolge: Route</option>
              <option value="name">Reihenfolge: Name A–Z</option>
              <option value="datum">Reihenfolge: Datum</option>
            </select>
            <button onClick={()=>setShowDone(v=>!v)} style={{
              background: showDone ? "#f0fdf4" : "#fff",
              border:`1px solid ${showDone ? G : "#e5e7eb"}`,
              borderRadius:8, padding:"7px 12px", fontSize:12,
              cursor:"pointer", color: showDone ? G : "#9ca3af", fontWeight:600,
              whiteSpace:"nowrap",
            }}>
              {showDone ? "✓ Erledigte ausblenden" : "✓ Erledigte einblenden"}
            </button>
          </>
        )}
        {isArchiv && doneCount > 0 && (
          <button onClick={onReset} style={{
            background:"#fef2f2", border:"1px solid #fca5a5",
            borderRadius:8, padding:"7px 14px", fontSize:12,
            cursor:"pointer", color:"#dc2626", fontWeight:700,
          }}>↺ Alle zurücksetzen</button>
        )}
        {!isArchiv && (
          <a href={mapsUrl(openList)} target="_blank" rel="noopener noreferrer"
            style={{
              background: board.color, color:"#fff", borderRadius:8,
              padding:"7px 14px", fontSize:12, fontWeight:700, textDecoration:"none",
              whiteSpace:"nowrap",
            }}>
            🗺️ Route ({openList.length} offen)
          </a>
        )}
        {isArchiv && doneCount > 0 && (
          <a href={mapsUrl(list)} target="_blank" rel="noopener noreferrer"
            style={{
              background:"#374151", color:"#fff", borderRadius:8,
              padding:"7px 14px", fontSize:12, fontWeight:700, textDecoration:"none",
              whiteSpace:"nowrap",
            }}>
            🗺️ Route Erledigte
          </a>
        )}
      </div>

      {/* List */}
      <div style={{ flex:1, overflow:"auto", padding:"12px 16px" }}>
        {list.length === 0 && (
          <div style={{ textAlign:"center", padding:48, color:"#9ca3af" }}>
            <div style={{ fontSize:36, marginBottom:12 }}>{isArchiv ? "📋" : "✅"}</div>
            <div style={{ fontSize:14, fontWeight:600 }}>
              {isArchiv ? "Noch keine Besuche abgehakt" : "Keine Treffer"}
            </div>
            {isArchiv && (
              <div style={{ fontSize:12, marginTop:6, color:"#d1d5db" }}>
                Hake Besuche in MA1–3 ab → sie erscheinen hier automatisch
              </div>
            )}
          </div>
        )}
        {list.map((p,i) => (
          <PatientCard key={p.id} p={p} idx={i+1} erledigt={erledigt} onToggle={onToggle} />
        ))}
      </div>

      {/* Footer count */}
      <div style={{
        padding:"8px 16px", borderTop:"1px solid #f3f4f6",
        fontSize:11, color:"#9ca3af", display:"flex", justifyContent:"space-between",
      }}>
        <span>{list.length} Einträge angezeigt</span>
        {!isArchiv && <span style={{color:G,fontWeight:600}}>{openList.length} noch offen · {doneCount} erledigt</span>}
      </div>
    </div>
  );
}

// ── App ───────────────────────────────────────────────────────────────────────
function App() {
  const [activeTab, setActiveTab] = useState("ma1");
  const { erledigt, toggle, reset, loaded } = useErledigt();

  const totalDone = Object.keys(erledigt).length;
  const totalPct  = Math.round(totalDone / PATIENTS.length * 100);

  if (!loaded) return (
    <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",fontFamily:"'Segoe UI',sans-serif"}}>
      <div style={{textAlign:"center",color:G}}>
        <div style={{fontSize:40,marginBottom:12}}>📋</div>
        <div style={{fontWeight:700,fontSize:16}}>BeJA §37.3 Dashboard wird geladen…</div>
      </div>
    </div>
  );

  const activeBoard = BOARDS.find(b => b.key === activeTab);

  return (
    <div style={{
      height:"100vh", display:"flex", flexDirection:"column",
      fontFamily:"'Segoe UI',system-ui,sans-serif",
      background:"#f8fafc",
    }}>
      <style>{`
        * { box-sizing: border-box; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 9px; }
        button:focus { outline: none; }
        a:hover { opacity: 0.85; }
      `}</style>

      {/* ── Top Header ── */}
      <div style={{
        background:"#fff", borderBottom:"1px solid #e5e7eb",
        padding:"10px 20px",
        display:"flex", alignItems:"center", gap:14, flexShrink:0,
      }}>
        <div style={{
          width:38, height:38, borderRadius:10, background:G,
          display:"flex", alignItems:"center", justifyContent:"center",
          fontSize:18, flexShrink:0,
        }}>📋</div>
        <div>
          <div style={{ fontWeight:800, fontSize:16, color:"#111" }}>BeJA §37.3 Tourplanung</div>
          <div style={{ fontSize:11, color:"#6b7280" }}>
            {PATIENTS.length} Patienten · Stand 19.05.2026
          </div>
        </div>

        {/* Global progress */}
        <div style={{ flex:1, maxWidth:320, marginLeft:16 }}>
          <div style={{ display:"flex", justifyContent:"space-between", marginBottom:3 }}>
            <span style={{ fontSize:11, color:"#6b7280" }}>Gesamtfortschritt</span>
            <span style={{ fontSize:11, fontWeight:800, color:G }}>
              {totalDone} / {PATIENTS.length} · {totalPct}%
            </span>
          </div>
          <div style={{ height:6, background:"#f3f4f6", borderRadius:9, overflow:"hidden" }}>
            <div style={{ height:"100%", width:`${totalPct}%`, background:`linear-gradient(90deg,${G},#4ade80)`, borderRadius:9, transition:"width 0.4s" }} />
          </div>
        </div>

        <div style={{ marginLeft:"auto", display:"flex", gap:8 }}>
          {BOARDS.map(b => {
            const cnt = b.key === "ma4"
              ? Object.keys(erledigt).length
              : b.group.filter(p=>erledigt[p.id]).length;
            const tot = b.key === "ma4" ? PATIENTS.length : b.group.length;
            return (
              <div key={b.key} style={{
                background: b.color+"12", border:`1px solid ${b.color}30`,
                borderRadius:8, padding:"4px 10px", textAlign:"center",
              }}>
                <div style={{ fontSize:11, fontWeight:800, color:b.color }}>{cnt}/{tot}</div>
                <div style={{ fontSize:9, color:"#9ca3af" }}>{b.short}</div>
              </div>
            );
          })}
        </div>
      </div>

      {/* ── Tab Bar ── */}
      <div style={{
        background:"#fff", borderBottom:"2px solid #e5e7eb",
        display:"flex", flexShrink:0, overflowX:"auto",
      }}>
        {BOARDS.map(b => {
          const active = activeTab === b.key;
          const cnt = b.key === "ma4"
            ? Object.keys(erledigt).length
            : b.group.filter(p=>erledigt[p.id]).length;
          const tot = b.key === "ma4" ? PATIENTS.length : b.group.length;
          const pct2 = tot > 0 ? Math.round(cnt/tot*100) : 0;
          return (
            <button key={b.key} onClick={() => setActiveTab(b.key)} style={{
              padding:"14px 24px",
              borderBottom: active ? `3px solid ${b.color}` : "3px solid transparent",
              background: "none", border:"none",
              borderBottom: active ? `3px solid ${b.color}` : "3px solid transparent",
              cursor:"pointer",
              display:"flex", alignItems:"center", gap:10,
              whiteSpace:"nowrap", flexShrink:0,
            }}>
              <div style={{
                width:28, height:28, borderRadius:7,
                background: active ? b.color : b.color+"20",
                color: active ? "#fff" : b.color,
                fontWeight:800, fontSize:11,
                display:"flex", alignItems:"center", justifyContent:"center",
              }}>{b.short.replace("MA ","")}</div>
              <div style={{ textAlign:"left" }}>
                <div style={{ fontSize:13, fontWeight:700, color: active ? "#111" : "#6b7280" }}>
                  {b.label}
                </div>
                <div style={{ fontSize:10, color:"#9ca3af" }}>
                  {b.sub} · {pct2}% erledigt
                </div>
              </div>
              {cnt > 0 && (
                <span style={{
                  background: G, color:"#fff",
                  borderRadius:999, padding:"1px 7px", fontSize:10, fontWeight:700,
                }}>{cnt}</span>
              )}
            </button>
          );
        })}
      </div>

      {/* ── Content ── */}
      <div style={{ flex:1, overflow:"hidden" }}>
        {activeBoard && (
          <BoardPanel
            key={activeBoard.key}
            board={activeBoard}
            erledigt={erledigt}
            onToggle={toggle}
            onReset={reset}
          />
        )}
      </div>
    </div>
  );
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
